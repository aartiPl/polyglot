name: Build
on:
  - push
  - workflow_dispatch
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository...
        uses: actions/checkout@v7

      - name: Setup Java...
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle...
        uses: gradle/actions/setup-gradle@v6

      - name: Run build...
        run: ./gradlew build
